name: E2E

on:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: |
          cp .env.example .env
          echo "SECRET_KEY=ci-secret-key-32-chars-minimum-x" >> .env
          echo "JWT_SECRET=ci-jwt-secret-32-chars-minimum-xx" >> .env
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d --build
          sleep 30

      - name: Wait for API health
        run: |
          for i in $(seq 1 24); do
            curl -sf http://localhost:8000/health && exit 0 || sleep 5
          done
          echo "API did not become healthy in time"
          exit 1

      - name: Wait for frontend
        run: |
          for i in $(seq 1 24); do
            curl -sf http://localhost:3000 && exit 0 || sleep 5
          done
          echo "Frontend did not become healthy in time"
          exit 1

      - name: Debug logs
        if: always()
        run: |
          echo "=== API logs ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs api | tail -30
          echo "=== Web logs ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs web | tail -30

      - name: Seed database
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml exec -T api python -m app.scripts.seed

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        working-directory: e2e
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        run: npm test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
