apiVersion: v1
kind: Service
metadata:
  name: {{ include "compass.fullname" . }}-api
  labels:
    {{- include "compass.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
